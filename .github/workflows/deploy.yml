name: Deploy to Pages Branch

on:
  # 每次推送到 `main` 分支时触发这个"工作流程"
  # 如果你使用了别的分支名，请按需将 `main` 替换成你的分支名
  push:
    branches: [ main ]
  repository_dispatch: # 👈 添加这个
    types:
      - content-updated
  # 允许你在 GitHub 上的 Actions 标签中手动触发此"工作流程"
  workflow_dispatch:

# 需要写入权限来推送到pages分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
        with:
          submodules: true  # 支持 Git Submodule 模式
          token: ${{ secrets.GITHUB_TOKEN }}  # 自动访问同账号下的私有仓库
          
      - name: Update submodules to latest
        run: git submodule update --remote
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.1.3"
          run_install: false
          
      - name: Install dependencies
        run: cd frontend && pnpm install --no-frozen-lockfile
      
      - name: Build site
        run: cd frontend && pnpm run build
      
      - name: Deploy to server via SSH & RSYNC
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
          rsync -avz --delete frontend/dist/ $SERVER_USER@$SERVER_HOST:/var/www/blog/
